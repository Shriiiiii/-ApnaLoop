name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes (Render sleeps after 15 minutes of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          echo "Pinging the backend to keep it awake..."
          curl -sS https://apnaloop.onrender.com/
          echo ""
          echo "Ping complete."
